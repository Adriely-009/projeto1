<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loguin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <input type="text" id="campoEmail" placeholder="Digite seu e-mail">
        <button onclick="verificarEmail()">Verificar</button>
        <p id="mensagemResultado"></p>
        <script>
            function verificarEmail() {

                let email = document.getElementById("campoEmail").value;
                
                let resultado = document.getElementById("mensagemResultado");
    
                let regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                if (regexEmail.test(email)) {
                    resultado.innerText = "E-mail válido!";
                    resultado.style.color = "green"; 
                } else {
                    resultado.innerText = "E-mail inválido!";
                    resultado.style.color = "red";   
                }
            }
        </script>
    
</body>
</html>
